<!doctype html>
<!-- ProxiCare caregiver-portal UX demo (Portal B · the family-caregiver lens, 50+).
     Self-contained: no build, no network, mock data. Open index.html directly.
     Embodies the 8 caregiver-first principles + accessibility (semantic controls,
     AA contrast, scalable rem, keyboard, color+word, reduced-motion, aria-live).
     NOT the operator console (that stays the dense s2 portal). See README.md. -->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>ProxiCare — Looking after Mom</title>
<style>
  :root{
    /* warm, calm palette — text colors verified ≥ 4.5:1 on the cream surfaces */
    --bg:#efe9dd; --surface:#fbf8f2; --sunk:#f1ece1; --line:#e2d9c8;
    --ink:#2b2722; --ink-2:#4a443c; --ink-3:#6b6457;            /* 3 readable text tiers */
    --accent:#b4532e; --accent-ink:#8f3f20;                      /* action (terracotta) */
    --calm:#3f7d54; --calm-soft:#e6f0e6;                         /* okay / positive */
    --look:#9a6a1a; --look-soft:#f7ecd4;                         /* worth a look (amber) */
    --alert:#b23b2e; --alert-soft:#f8e4df;                       /* needs you (soft red) */
    --rad:18px; --tap:54px;
    --serif:"Iowan Old Style","Palatino Linotype",Georgia,serif;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    font-size:18px;                                              /* large base; everything in rem scales */
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);font-family:var(--sans);color:var(--ink);line-height:1.5;
       -webkit-font-smoothing:antialiased;display:flex;justify-content:center;min-height:100vh}
  /* phone frame on desktop; full-bleed on small screens */
  .phone{width:100%;max-width:430px;background:var(--surface);min-height:100vh;position:relative;
         display:flex;flex-direction:column;box-shadow:0 30px 80px rgba(60,40,20,.18)}
  @media(min-width:480px){ .phone{margin:24px 0;min-height:880px;height:880px;border-radius:38px;
         overflow:hidden;border:1px solid var(--line)} body{align-items:flex-start} }

  /* ---- top bar ---- */
  .top{display:flex;align-items:center;gap:.5rem;padding:1rem 1.15rem .5rem;min-height:56px}
  .back{appearance:none;border:none;background:var(--sunk);color:var(--ink);width:44px;height:44px;
        border-radius:50%;font-size:1.25rem;cursor:pointer;display:grid;place-items:center}
  .top h2{font-family:var(--serif);font-size:1.3rem;margin:0;font-weight:600}
  .eyebrow{font-size:.8rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);font-weight:600}

  /* ---- scroll area + bottom nav ---- */
  .stage{flex:1;overflow-y:auto;padding:0 1.15rem 1.5rem;-webkit-overflow-scrolling:touch}
  .nav{display:flex;border-top:1px solid var(--line);background:var(--surface)}
  .nav button{flex:1;appearance:none;border:none;background:none;cursor:pointer;padding:.55rem 0 .7rem;
       color:var(--ink-3);font-size:.78rem;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:var(--sans)}
  .nav button[aria-current="page"]{color:var(--accent-ink);font-weight:700}
  .nav .ic{font-size:1.4rem;line-height:1}

  /* ---- cards & blocks ---- */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--rad);padding:1.1rem 1.15rem;margin-bottom:.85rem}
  .hero{padding:1.25rem}
  .hero.alert{background:var(--alert-soft);border-color:#eccabf}
  .hero.calm{background:var(--calm-soft);border-color:#cfe3cf}
  .hero h3{font-family:var(--serif);font-size:1.65rem;line-height:1.2;margin:.5rem 0 .5rem;font-weight:600}
  .hero p{margin:.25rem 0 1rem;color:var(--ink-2);font-size:1.02rem}
  .row{display:flex;align-items:center;gap:.85rem;width:100%;text-align:left;appearance:none;cursor:pointer;
       background:var(--surface);border:1px solid var(--line);border-radius:var(--rad);
       padding:.95rem 1.05rem;margin-bottom:.7rem;font:inherit;color:inherit;min-height:var(--tap)}
  .row .rtitle{font-weight:600;font-size:1.05rem}
  .row .rsub{color:var(--ink-3);font-size:.9rem;margin-top:1px}
  .row .chev{margin-left:auto;color:var(--ink-3);font-size:1.3rem}
  .row .lead{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:1.25rem;flex:none;background:var(--sunk)}

  .pill{display:inline-flex;align-items:center;gap:.4rem;font-size:.78rem;font-weight:700;
        padding:.28rem .6rem;border-radius:999px}
  .pill.alert{background:var(--alert);color:#fff}
  .pill.look{background:var(--look);color:#fff}
  .pill.calm{background:var(--calm);color:#fff}
  .pill.soft{background:var(--sunk);color:var(--ink-2)}
  .dot{width:.55rem;height:.55rem;border-radius:50%;flex:none}

  .btn{appearance:none;border:none;border-radius:14px;font:inherit;font-weight:700;cursor:pointer;
       width:100%;min-height:var(--tap);font-size:1.05rem}
  .btn.primary{background:var(--accent);color:#fff}
  .btn.ghost{background:var(--sunk);color:var(--ink);font-weight:600}
  .btn.calm{background:var(--calm);color:#fff}
  .btnrow{display:flex;gap:.6rem;margin-top:.5rem}
  .btnrow .btn{flex:1}

  .reassure{text-align:center;color:var(--ink-3);font-size:.92rem;margin:1.4rem .5rem .4rem}
  .muted{color:var(--ink-3)} .small{font-size:.85rem}
  .section-label{font-size:.8rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);
        font-weight:600;margin:1.3rem .2rem .5rem}

  /* chat bubbles for "what was said" */
  .bubble{max-width:84%;padding:.7rem .9rem;border-radius:16px;margin:.5rem 0;font-size:1rem}
  .bubble.twin{background:var(--calm-soft);margin-left:auto;border-bottom-right-radius:5px}
  .bubble.mom{background:var(--sunk);border-bottom-left-radius:5px}
  .bubble .who{font-size:.72rem;font-weight:700;letter-spacing:.05em;color:var(--ink-3);margin-bottom:2px}
  .flagged{display:inline-flex;gap:.35rem;align-items:center;font-size:.78rem;color:var(--alert);font-weight:700;margin-top:.3rem}

  .listen{width:100%;min-height:48px;border-radius:14px;border:1px dashed var(--line);background:var(--sunk);
          font:inherit;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.5rem;margin:.6rem 0}
  .progress{font-size:.85rem;color:var(--ink-3);font-weight:600}
  .mic{width:120px;height:120px;border-radius:50%;background:var(--accent);color:#fff;border:none;cursor:pointer;
       font-size:2.6rem;display:grid;place-items:center;margin:1.2rem auto;box-shadow:0 14px 36px rgba(180,83,46,.4)}
  .ring{--p:0;width:128px;height:128px;border-radius:50%;margin:1rem auto;display:grid;place-items:center;
        background:conic-gradient(var(--calm) calc(var(--p)*1%), var(--sunk) 0)}
  .ring > div{width:104px;height:104px;border-radius:50%;background:var(--surface);display:grid;place-items:center;text-align:center}
  .ring b{font-family:var(--serif);font-size:1.7rem}
  .barrow{display:flex;align-items:center;gap:.7rem;margin:.5rem 0;font-size:.95rem}
  .bar{flex:1;height:9px;background:var(--sunk);border-radius:999px;overflow:hidden}
  .bar i{display:block;height:100%;background:var(--calm);border-radius:999px}
  .field{width:100%;min-height:var(--tap);border:1px solid var(--line);border-radius:14px;padding:.7rem .9rem;
         font:inherit;background:var(--surface);color:var(--ink);margin:.3rem 0 .9rem}
  label.lbl{font-size:.8rem;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-3);font-weight:600}
  .toggle{display:flex;justify-content:space-between;align-items:center;padding:.85rem 0;border-bottom:1px solid var(--line)}
  .switch{width:52px;height:30px;border-radius:999px;border:none;cursor:pointer;position:relative;background:var(--calm)}
  .switch[aria-checked="false"]{background:var(--line)}
  .switch::after{content:"";position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:#fff;transition:left .15s}
  .switch[aria-checked="true"]::after{left:25px}

  /* focus + motion accessibility */
  a,button,[tabindex]{outline:none}
  :focus-visible{outline:3px solid var(--accent);outline-offset:2px;border-radius:6px}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  .live-dot{animation:pulse 1.5s infinite}
  @keyframes pulse{0%{opacity:1}50%{opacity:.35}100%{opacity:1}}

  /* demo control (not part of product) */
  .demo{position:absolute;right:12px;bottom:74px;z-index:9}
  .demo button{background:#2b2722;color:#fff;border:none;border-radius:999px;padding:.5rem .8rem;font-size:.8rem;cursor:pointer}
  .demo .panel{position:absolute;right:0;bottom:44px;background:#2b2722;color:#fff;border-radius:14px;padding:.7rem;width:210px;display:none}
  .demo .panel.open{display:block}
  .demo .panel h4{margin:.1rem 0 .5rem;font-size:.8rem;opacity:.7;text-transform:uppercase;letter-spacing:.06em}
  .demo .panel button{display:block;width:100%;text-align:left;background:#3a352e;margin:.25rem 0;border-radius:8px}
  .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
</style>
</head>
<body>
<div class="phone">
  <div class="top" id="top"></div>
  <main class="stage" id="stage" tabindex="-1"></main>
  <nav class="nav" id="nav" aria-label="Main"></nav>

  <div class="demo">
    <div class="panel" id="demoPanel">
      <h4>Demo state</h4>
      <button onclick="setState('attention')">A tough moment happened</button>
      <button onclick="setState('calm')">A calm day (all is well)</button>
      <h4 style="margin-top:.6rem">Jump to</h4>
      <button onclick="go('memory')">Memory book</button>
      <button onclick="go('gap')">Fill a gap (voice)</button>
      <button onclick="go('account')">Settings &amp; consent</button>
    </div>
    <button onclick="document.getElementById('demoPanel').classList.toggle('open')" aria-label="Demo controls">demo ⚙</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// Mock data — system events already TRANSLATED into how a daughter thinks.
// (Principle 3: plain human language; Principle 2: the system did the triage.)
const PATIENT = { name:"Mom", who:"your mother", age:83, stage:"moderate-stage Alzheimer's" };

let STATE = "attention";  // "attention" | "calm"  (demo toggles principle 1 & 6)

const MOMENT = {
  tone:"alert", kind:"A tough moment this morning", when:"Today, 9:21 AM · from an 11-minute call",
  summary:"Mom got upset looking for Dad near the end of the call. The twin stayed calm, reassured her, and the call ended gently.",
  said:[
    {who:"the twin", t:"It's me. It's Thursday. The garden's probably waking up about now."},
    {who:"Mom", t:"The roses… your father planted the roses. Where is he? He didn't come down."},
    {who:"Mom", t:"He's late. He's never late. Something's wrong, I can feel it.", flag:"This is the upsetting moment"},
    {who:"the twin", t:"Let's take a breath together. You're safe, and I'm right here with you."},
  ],
  adjust:"Mom gets upset looking for Dad. You can soften how the twin responds, or have it tell you sooner."
};

const APPROVALS = [
  { tags:["From a call","Life stories"], text:"Mom planted the roses with Dad; she may ask where he is." },
  { tags:["From a call","People"], text:"Mom calls her neighbour “the kind young man next door.”" },
  { tags:["You said it"], text:"Mom likes her tea with a little honey, not sugar." },
];

const CALLS = [
  { affect:"tough", when:"Today, 9:14 AM", len:"11 min", text:"Mom talked about the garden and asked twice when you're visiting. Warm, a little forgetful. One tough moment near the end — handled gently." },
  { affect:"calm", when:"Yesterday, 6:40 PM", len:"7 min", text:"Quiet check-in before dinner. She mentioned Dr. Reyes on Tuesday and that Sarah called." },
  { affect:"bright", when:"Yesterday, 8:55 AM", len:"9 min", text:"Good morning call. Reminisced about Sanibel Island. Took her medication prompt well." },
  { affect:"calm", when:"Mon, 9:02 AM", len:"6 min", text:"Short and steady. Asked about the weather and the cat." },
];
const AFFECT = { tough:{c:"var(--look)",w:"a tough moment"}, calm:{c:"var(--calm)",w:"calm"}, bright:{c:"var(--calm)",w:"bright"} };

const MEMORY = {
  "People":["Dad — her husband, planted the roses together","Sarah — her daughter, calls on weekends","“The kind young man next door”"],
  "Life stories":["Summers at Sanibel Island collecting shells","Taught third grade for 30 years","Met Dad at a church dance in 1961"],
  "Likes & comforts":["Tea with a little honey","The garden, especially the roses","Her cat, Biscuit"],
  "Health & care notes":["Morning medication around 9 AM","Dr. Reyes — next visit Tuesday","Gets anxious in the late afternoon"],
};

const GAPS = [
  { q:"What's a story Mom loves to retell?", area:"Life stories" },
  { q:"Who are the people she asks about most?", area:"People" },
  { q:"What helps her settle when she's anxious?", area:"Comfort" },
];

const PROMISES = [
  { text:"Sarah is visiting on Sunday afternoon", when:"until Sunday", live:true },
  { text:"Rami will call tonight at 7", when:"until tonight", live:true },
];

// ─────────────────────────────────────────────────────────────────────────────
// tiny router — a linear stack: every screen has ONE back step (Principle 4)
const stage = document.getElementById('stage');
const topEl = document.getElementById('top');
let stack = [];

function go(name, opts={}){ stack.push({name,opts}); render(); }
function back(){ stack.pop(); render(); }
function root(name){ stack=[{name,opts:{}}]; render(); }

const SCREENS = {}; // name -> {title, back, render}

function render(){
  const cur = stack[stack.length-1] || {name:"home",opts:{}};
  const s = SCREENS[cur.name];
  // top bar
  if(cur.name==="home"){
    topEl.innerHTML = `<div><div class="eyebrow">Good morning</div><h2>Looking after ${PATIENT.name}</h2></div>
       <div style="margin-left:auto" class="lead" aria-hidden="true">🌿</div>`;
  } else {
    topEl.innerHTML = `<button class="back" onclick="back()" aria-label="Go back">‹</button><h2>${s.title}</h2>`;
  }
  stage.innerHTML = s.render(cur.opts);
  stage.scrollTop = 0; stage.focus();
  renderNav(cur.name);
}

function renderNav(active){
  const items=[["home","🏠","Home"],["memory","📖","Memory book"],["account","⚙️","Settings"]];
  document.getElementById('nav').innerHTML = items.map(([id,ic,lbl])=>
    `<button onclick="root('${id}')" ${active===id?'aria-current="page"':''}>
       <span class="ic" aria-hidden="true">${ic}</span><span>${lbl}</span></button>`).join('');
}

function setState(s){ STATE=s; document.getElementById('demoPanel').classList.remove('open'); root('home'); }

// ── HOME — answers one question: "Is everything okay?" (Principle 1, 2, 6) ──
SCREENS.home = { title:"Home", render(){
  const verdict = STATE==="attention"
    ? `<div class="hero alert card" role="status" aria-live="polite">
         <span class="pill alert"><span class="dot" style="background:#fff"></span> One thing to look at</span>
         <h3>${MOMENT.kind}</h3>
         <p>${MOMENT.summary}</p>
         <button class="btn primary" onclick="go('moment')">See what happened</button>
       </div>`
    : `<div class="hero calm card" role="status" aria-live="polite">
         <span class="pill calm">✓ Everything's calm</span>
         <h3>${PATIENT.name} had a calm morning</h3>
         <p>A gentle 9-minute call. Nothing needs you right now — you can breathe easy.</p>
         <button class="btn ghost" onclick="go('activity')">Listen if you'd like</button>
       </div>`;
  const secondary = [
    STATE==="attention" ? row("🟡","Worth a look","Mom seemed unsure whether she'd eaten · yesterday","go('moment2')") : "",
    row("🌱",`${APPROVALS.length} things to approve`,"New things the twin learned about Mom","go('approve')"),
    row("📞","Recent calls","4 this week · all gentle, all replayable","go('activity')"),
    row("🎙️","Fill a gap together","Tell the twin more about Mom — just talk","go('gap')"),
  ].join("");
  return verdict + `<div style="margin-top:.4rem">${secondary}</div>` +
    `<p class="reassure">The twin is always growing — never “done.” You're doing enough. 💛</p>`;
}};

function row(icon,title,sub,onclick){
  return `<button class="row" onclick="${onclick}">
    <span class="lead" aria-hidden="true">${icon}</span>
    <span><span class="rtitle">${title}</span><br><span class="rsub">${sub}</span></span>
    <span class="chev" aria-hidden="true">›</span></button>`;
}

// ── MOMENT — one event, story-framed, snippet audio, one clear action ──
function momentScreen(m){ return {
  title:"What happened", render(){
    const said = m.said.map(b=>`
      <div class="bubble ${b.who==='the twin'?'twin':'mom'}">
        <div class="who">${b.who==='the twin'?'THE TWIN':PATIENT.name.toUpperCase()}</div>${b.t}
        ${b.flag?`<div class="flagged">⚑ ${b.flag}</div>`:''}
      </div>`).join("");
    return `
      <span class="pill ${m.tone}">${m.tone==='alert'?'Needs you':'Worth a look'}</span>
      <h3 style="font-family:var(--serif);font-size:1.5rem;margin:.6rem 0 .2rem">${m.kind}</h3>
      <div class="muted small" style="margin-bottom:.8rem">${m.when}</div>
      <div class="card" style="background:${m.tone==='alert'?'var(--alert-soft)':'var(--look-soft)'};border:none">${m.summary}</div>
      <div class="section-label">What was said</div>
      ${said}
      <button class="listen" onclick="say('Playing just this moment…')">▶ Listen to this moment</button>
      <div class="card"><b>Want to change how this goes?</b><br><span class="muted">${m.adjust}</span>
        <div class="btnrow"><button class="btn ghost" onclick="say('Opened: soften the twin’s response')">Adjust the twin</button></div></div>
      <div class="btnrow">
        <button class="btn primary" onclick="say('Marked reviewed · nice work');back()">Mark reviewed</button>
        <button class="btn ghost" onclick="say('Thanks — that helps the twin learn');back()">This was fine</button>
      </div>`;
  }};
}
SCREENS.moment = momentScreen(MOMENT);
SCREENS.moment2 = momentScreen({ tone:"look", kind:"Mom seemed unsure", when:"Yesterday, 6:51 PM · from a 7-minute call",
  summary:"Mom wasn't sure whether she'd eaten. Worth a glance, not urgent.",
  said:[{who:"Mom",t:"Did I have lunch? I can't… I don't think I did."},
        {who:"the twin",t:"You had soup a little while ago — and there's more whenever you're hungry."}],
  adjust:"If this keeps happening, the twin can gently remind her about meals." });

// ── APPROVE — one card at a time, big plain choices, progress (Principle 2,5,6) ──
SCREENS.approve = { title:"For your review", render(opts){
  const i = opts.i||0;
  if(i>=APPROVALS.length) return `<div style="text-align:center;padding:3rem 1rem">
     <div style="font-size:3rem">✓</div><h3 style="font-family:var(--serif)">All done</h3>
     <p class="muted">Nothing else to review. The twin will keep learning — we'll save it up for you.</p>
     <button class="btn primary" onclick="back()">Back home</button></div>`;
  const a = APPROVALS[i];
  return `<div class="progress" style="text-align:right">${i+1} of ${APPROVALS.length}</div>
    <div class="card" style="margin-top:.4rem">
      <div>${a.tags.map(t=>`<span class="pill soft" style="margin-right:.3rem">${t}</span>`).join("")}</div>
      <p style="font-family:var(--serif);font-size:1.35rem;line-height:1.3;margin:.7rem 0 .3rem">${a.text}</p>
      <button class="listen" style="min-height:40px" onclick="say('Edit before adding…')">✎ Edit before adding</button>
    </div>
    <button class="btn calm" onclick="say('Added to the memory book');go('approve',{i:${i+1}})">✓ Add to memory book</button>
    <div class="btnrow">
      <button class="btn ghost" onclick="go('approve',{i:${i+1}})">Skip for now</button>
      <button class="btn ghost" onclick="say('Got it — won’t add that');go('approve',{i:${i+1}})">Not true</button>
    </div>
    <p class="reassure">Adding puts it in Mom's memory book — the twin uses it on the next call.</p>`;
}};

// ── RECENT CALLS — narrative + affect tags; the system carries the memory (P8) ──
SCREENS.activity = { title:"Recent calls", render(){
  return CALLS.map((c,idx)=>{
    const a=AFFECT[c.affect];
    return `<button class="row" style="align-items:flex-start" onclick="go('call',{i:${idx}})">
      <span class="dot" style="background:${a.c};margin-top:.5rem"></span>
      <span><span class="rtitle">${c.when}</span> · <span class="muted small">${a.w} · ${c.len}</span>
        <br><span class="rsub">${c.text}</span></span></button>`;
  }).join("") + `<p class="reassure">Every call is saved and replayable. You never have to remember — we do.</p>`;
}};
SCREENS.call = { title:"The call", render(opts){
  const c=CALLS[opts.i||0]; const a=AFFECT[c.affect];
  return `<div class="card"><span class="pill" style="background:${a.c};color:#fff">${a.w}</span>
      <div class="muted small" style="margin:.5rem 0">${c.when} · ${c.len}</div>
      <p style="font-size:1.05rem">${c.text}</p>
      <button class="listen" onclick="say('Playing the call…')">▶ Listen to the whole call</button></div>
    ${c.affect==='tough'?`<button class="row" onclick="go('moment')"><span class="lead">🟡</span>
        <span><span class="rtitle">See the tough moment</span><br><span class="rsub">Jump to what needs you</span></span>
        <span class="chev">›</span></button>`:''}`;
}};

// ── MEMORY BOOK — plain sections, voice add (Principle 7) ──
SCREENS.memory = { title:"Memory book", render(){
  const secs = Object.entries(MEMORY).map(([k,v])=>
    row("•",k,`${v.length} memories`,`go('memlist',{k:'${k}'})`)).join("");
  return `<p class="muted" style="margin:.2rem 0 1rem">Everything the twin knows about ${PATIENT.name}. Tap a section to read or add.</p>
    ${secs}
    <button class="btn primary" style="margin-top:.4rem" onclick="go('gap')">🎙️ Add a memory — just talk</button>`;
}};
SCREENS.memlist = { title:"Memory book", render(opts){
  const items=MEMORY[opts.k]||[];
  return `<div class="section-label">${opts.k}</div>` + items.map(t=>
    `<div class="card" style="display:flex;gap:.7rem;align-items:flex-start">
       <span aria-hidden="true">💬</span><span>${t}</span></div>`).join("") +
    `<button class="btn ghost" onclick="say('Add to ${opts.k}…')">＋ Add to ${opts.k}</button>`;
}};

// ── FILL A GAP — voice-first interview (Principle 7) ──
SCREENS.gap = { title:"Fill a gap together", render(opts){
  const i=opts.i||0;
  if(i>=GAPS.length) return `<div style="text-align:center;padding:2.5rem 1rem">
     <div style="font-size:3rem">🌼</div><h3 style="font-family:var(--serif)">Thank you</h3>
     <p class="muted">You filled 3 gaps. ${PATIENT.name}'s twin just got a little more like her.</p>
     <button class="btn primary" onclick="back()">Back home</button></div>`;
  const g=GAPS[i]; const pct=Math.round((i/GAPS.length)*100);
  return `<div class="ring" style="--p:${pct}"><div><b>${i}/${GAPS.length}</b><br><span class="small muted">filled</span></div></div>
    <div class="card" style="text-align:center"><span class="pill soft">${g.area}</span>
      <p style="font-family:var(--serif);font-size:1.45rem;line-height:1.3;margin:.7rem 0">${g.q}</p></div>
    <button class="mic" aria-label="Hold to answer with your voice" onclick="say('Listening… answer however you like')">🎙️</button>
    <p style="text-align:center" class="muted">Tap and answer however you like — no right words needed.</p>
    <div class="btnrow">
      <button class="btn ghost" onclick="go('gap',{i:${i+1}})">Type instead</button>
      <button class="btn ghost" onclick="go('gap',{i:${i+1}})">Skip</button>
    </div>`;
}};

// ── SETTINGS & CONSENT — plain, reassuring, gentle exit (Principle 3,6) ──
SCREENS.account = { title:"Settings", render(){
  return `
    <div class="section-label">How calls reach ${PATIENT.name}</div>
    <div class="card">
      <div class="barrow"><span>📱 Mom calls her own number</span></div>
      <div class="barrow"><span>↳ The twin answers in your cloned voice</span></div>
      <div class="barrow"><span>↳ It can hand the call to you anytime</span></div>
    </div>
    <div class="section-label">What you've allowed</div>
    <div class="card" style="padding-top:.4rem">
      ${consent("Record calls","So you can listen back",true)}
      ${consent("Let the twin listen to your calls","To learn Mom's voice & stories",true)}
      ${consent("Quiet hours (9pm–8am)","Only urgent things reach you",false)}
    </div>
    <div class="section-label">You</div>
    <div class="card">
      <label class="lbl">How the twin reaches you</label>
      <input class="field" value="+1 (218) 630-8231" aria-label="Your phone">
      <button class="btn ghost" onclick="say('Saved')">Save</button>
    </div>
    <button class="btn ghost" style="margin-top:.4rem;color:var(--accent-ink)" onclick="say('We’ll walk you through it gently — nothing happens without your say-so.')">Leave the program</button>
    <p class="reassure">Big changes (like consent) go through your care coordinator — you're never alone with a hard decision.</p>`;
}};
function consent(title,sub,on){
  return `<div class="toggle"><span><b>${title}</b><br><span class="muted small">${sub}</span></span>
    <button class="switch" role="switch" aria-checked="${on}" aria-label="${title}"
      onclick="this.setAttribute('aria-checked', this.getAttribute('aria-checked')==='true'?'false':'true')"></button></div>`;
}

// toast
function say(msg){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';
    t.style.cssText='position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:#2b2722;color:#fff;padding:.7rem 1.1rem;border-radius:999px;font-size:.92rem;z-index:50;max-width:88%;text-align:center';
    document.body.appendChild(t);}
  t.textContent=msg; t.style.opacity=1;
  clearTimeout(t._h); t._h=setTimeout(()=>t.style.opacity=0,2600);
}

root('home');
</script>
</body>
</html>
