<!doctype html>
<!-- ProxiCare caregiver-portal UX demo (Portal B · the family-caregiver lens, 50+).
     Self-contained: no build, no network, mock data. Open index.html directly.
     Covers all apps/UX component tasks POR.1–POR.16 in caregiver language.
     Embodies the 8 caregiver-first principles + accessibility (semantic controls,
     AA contrast, scalable rem, keyboard, color+word, aria-live, reduced-motion).
     NOT the operator console (that stays the dense s2 portal). See README.md. -->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>ProxiCare — Looking after Mom</title>
<style>
  :root{
    --bg:#efe9dd; --surface:#fbf8f2; --sunk:#f1ece1; --line:#e2d9c8;
    --ink:#2b2722; --ink-2:#4a443c; --ink-3:#6b6457;
    --accent:#b4532e; --accent-ink:#8f3f20;
    --calm:#3f7d54; --calm-soft:#e6f0e6;
    --look:#9a6a1a; --look-soft:#f7ecd4;
    --alert:#b23b2e; --alert-soft:#f8e4df;
    --rad:18px; --tap:54px;
    --serif:"Iowan Old Style","Palatino Linotype",Georgia,serif;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    font-size:18px;
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{background:var(--bg);font-family:var(--sans);color:var(--ink);line-height:1.5;
       -webkit-font-smoothing:antialiased;display:flex;justify-content:center;min-height:100vh}
  .phone{width:100%;max-width:430px;background:var(--surface);min-height:100vh;position:relative;
         display:flex;flex-direction:column;box-shadow:0 30px 80px rgba(60,40,20,.18)}
  @media(min-width:480px){ .phone{margin:24px 0;min-height:880px;height:880px;border-radius:38px;
         overflow:hidden;border:1px solid var(--line)} body{align-items:flex-start} }

  .top{display:flex;align-items:center;gap:.5rem;padding:1rem 1.15rem .5rem;min-height:56px}
  .back{appearance:none;border:none;background:var(--sunk);color:var(--ink);width:44px;height:44px;
        border-radius:50%;font-size:1.25rem;cursor:pointer;display:grid;place-items:center}
  .top h2{font-family:var(--serif);font-size:1.3rem;margin:0;font-weight:600}
  .eyebrow{font-size:.8rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);font-weight:600}

  .stage{flex:1;overflow-y:auto;padding:0 1.15rem 5.5rem;-webkit-overflow-scrolling:touch;position:relative}
  .nav{display:flex;border-top:1px solid var(--line);background:var(--surface)}
  .nav button{flex:1;appearance:none;border:none;background:none;cursor:pointer;padding:.55rem 0 .7rem;
       color:var(--ink-3);font-size:.74rem;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:var(--sans)}
  .nav button[aria-current="page"]{color:var(--accent-ink);font-weight:700}
  .nav .ic{font-size:1.35rem;line-height:1}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--rad);padding:1.1rem 1.15rem;margin-bottom:.85rem}
  .hero{padding:1.25rem}
  .hero.alert{background:var(--alert-soft);border-color:#eccabf}
  .hero.calm{background:var(--calm-soft);border-color:#cfe3cf}
  .hero h3{font-family:var(--serif);font-size:1.6rem;line-height:1.2;margin:.5rem 0;font-weight:600}
  .hero p{margin:.25rem 0 1rem;color:var(--ink-2);font-size:1.02rem}
  .row{display:flex;align-items:center;gap:.85rem;width:100%;text-align:left;appearance:none;cursor:pointer;
       background:var(--surface);border:1px solid var(--line);border-radius:var(--rad);
       padding:.95rem 1.05rem;margin-bottom:.7rem;font:inherit;color:inherit;min-height:var(--tap)}
  .row .rtitle{font-weight:600;font-size:1.05rem}
  .row .rsub{color:var(--ink-3);font-size:.88rem;margin-top:1px}
  .row .chev{margin-left:auto;color:var(--ink-3);font-size:1.3rem}
  .row .lead{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:1.25rem;flex:none;background:var(--sunk)}

  .pill{display:inline-flex;align-items:center;gap:.4rem;font-size:.78rem;font-weight:700;padding:.28rem .6rem;border-radius:999px}
  .pill.alert{background:var(--alert);color:#fff}.pill.look{background:var(--look);color:#fff}
  .pill.calm{background:var(--calm);color:#fff}.pill.soft{background:var(--sunk);color:var(--ink-2)}
  .dot{width:.55rem;height:.55rem;border-radius:50%;flex:none}

  .btn{appearance:none;border:none;border-radius:14px;font:inherit;font-weight:700;cursor:pointer;width:100%;min-height:var(--tap);font-size:1.05rem}
  .btn.primary{background:var(--accent);color:#fff}.btn.ghost{background:var(--sunk);color:var(--ink);font-weight:600}
  .btn.calm{background:var(--calm);color:#fff}.btn.danger{background:#fff;color:var(--alert);border:1.5px solid var(--alert)}
  .btnrow{display:flex;gap:.6rem;margin-top:.5rem}.btnrow .btn{flex:1}

  .reassure{text-align:center;color:var(--ink-3);font-size:.92rem;margin:1.4rem .5rem .4rem}
  .muted{color:var(--ink-3)} .small{font-size:.85rem}
  .section-label{font-size:.8rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);font-weight:600;margin:1.3rem .2rem .5rem}
  .intro{color:var(--ink-2);margin:.2rem .1rem 1rem}

  .bubble{max-width:84%;padding:.7rem .9rem;border-radius:16px;margin:.5rem 0;font-size:1rem}
  .bubble.twin{background:var(--calm-soft);margin-left:auto;border-bottom-right-radius:5px}
  .bubble.mom{background:var(--sunk);border-bottom-left-radius:5px}
  .bubble .who{font-size:.72rem;font-weight:700;letter-spacing:.05em;color:var(--ink-3);margin-bottom:2px}
  .flagged{display:inline-flex;gap:.35rem;align-items:center;font-size:.78rem;color:var(--alert);font-weight:700;margin-top:.3rem}

  .listen{width:100%;min-height:48px;border-radius:14px;border:1px dashed var(--line);background:var(--sunk);
          font:inherit;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.5rem;margin:.6rem 0}
  .progress{font-size:.85rem;color:var(--ink-3);font-weight:600}
  .mic{width:118px;height:118px;border-radius:50%;background:var(--accent);color:#fff;border:none;cursor:pointer;
       font-size:2.6rem;display:grid;place-items:center;margin:1.1rem auto;box-shadow:0 14px 36px rgba(180,83,46,.4)}
  .ring{--p:0;width:128px;height:128px;border-radius:50%;margin:1rem auto;display:grid;place-items:center;
        background:conic-gradient(var(--calm) calc(var(--p)*1%), var(--sunk) 0)}
  .ring > div{width:104px;height:104px;border-radius:50%;background:var(--surface);display:grid;place-items:center;text-align:center}
  .ring b{font-family:var(--serif);font-size:1.7rem}
  .barrow{display:flex;align-items:center;gap:.7rem;margin:.55rem 0;font-size:.95rem}
  .barrow .bl{width:9rem;flex:none}.barrow .bn{width:2.6rem;text-align:right;color:var(--ink-3);font-size:.85rem}
  .bar{flex:1;height:9px;background:var(--sunk);border-radius:999px;overflow:hidden}
  .bar i{display:block;height:100%;background:var(--calm);border-radius:999px}
  .field{width:100%;min-height:var(--tap);border:1px solid var(--line);border-radius:14px;padding:.7rem .9rem;font:inherit;background:var(--surface);color:var(--ink);margin:.3rem 0 .9rem}
  label.lbl{font-size:.8rem;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-3);font-weight:600}
  .toggle{display:flex;justify-content:space-between;align-items:center;gap:.8rem;padding:.85rem 0;border-bottom:1px solid var(--line)}
  .toggle:last-child{border-bottom:none}
  .switch{width:52px;height:30px;border-radius:999px;border:none;cursor:pointer;position:relative;background:var(--calm);flex:none}
  .switch[aria-checked="false"]{background:var(--line)}
  .switch::after{content:"";position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:#fff;transition:left .15s}
  .switch[aria-checked="true"]::after{left:25px}
  .chip{display:inline-block;padding:.45rem .8rem;border-radius:999px;border:1px solid var(--line);background:var(--surface);
        font:inherit;font-size:.9rem;cursor:pointer;margin:.2rem .35rem .2rem 0}
  .chip[aria-pressed="true"]{background:var(--accent);color:#fff;border-color:var(--accent)}
  .diff li{list-style:none}.diff .add{background:var(--calm-soft)}.diff .del{background:var(--alert-soft);text-decoration:line-through;color:var(--ink-3)}
  .stepbar{display:flex;gap:6px;margin:.2rem 0 1rem}.stepbar i{flex:1;height:6px;border-radius:99px;background:var(--sunk)}.stepbar i.on{background:var(--calm)}

  a,button,[tabindex]{outline:none}
  :focus-visible{outline:3px solid var(--accent);outline-offset:2px;border-radius:6px}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  @keyframes pulse{0%{opacity:1}50%{opacity:.35}100%{opacity:1}}

  .fab{position:absolute;right:16px;bottom:16px;z-index:8;width:58px;height:58px;border-radius:50%;border:none;cursor:pointer;
       background:var(--accent);color:#fff;font-size:1.5rem;box-shadow:0 12px 30px rgba(180,83,46,.4)}
  .demo{position:absolute;left:12px;bottom:74px;z-index:9}
  .demo button{background:#2b2722;color:#fff;border:none;border-radius:999px;padding:.5rem .8rem;font-size:.78rem;cursor:pointer}
  .demo .panel{position:absolute;left:0;bottom:44px;background:#2b2722;color:#fff;border-radius:14px;padding:.7rem;width:210px;display:none;max-height:60vh;overflow:auto}
  .demo .panel.open{display:block}
  .demo .panel h4{margin:.4rem 0 .3rem;font-size:.72rem;opacity:.7;text-transform:uppercase;letter-spacing:.06em}
  .demo .panel button{display:block;width:100%;text-align:left;background:#3a352e;margin:.22rem 0;border-radius:8px;font-size:.8rem}
  .sheet{position:absolute;inset:0;background:rgba(30,24,18,.45);z-index:20;display:flex;align-items:flex-end}
  .sheet .inner{background:var(--surface);width:100%;border-radius:22px 22px 0 0;padding:1.2rem 1.15rem 1.5rem;max-height:86%;overflow:auto}
  .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
</style>
</head>
<body>
<div class="phone">
  <div class="top" id="top"></div>
  <main class="stage" id="stage" tabindex="-1"></main>
  <button class="fab" id="fab" aria-label="Add a memory by voice" onclick="openMemo()" style="display:none">🎙️</button>
  <nav class="nav" id="nav" aria-label="Main"></nav>

  <div class="demo">
    <div class="panel" id="demoPanel">
      <h4>Demo state</h4>
      <button onclick="setState('attention')">A tough moment happened</button>
      <button onclick="setState('calm')">A calm day (all is well)</button>
      <h4>Manage the twin</h4>
      <button onclick="go('voice')">Voice &amp; corpus (POR.9)</button>
      <button onclick="go('talks')">How the twin talks (POR.10)</button>
      <button onclick="go('handles')">How it handles things (POR.12)</button>
      <h4>Flows</h4>
      <button onclick="go('wizard',{step:1})">First-run wizard (POR.1)</button>
      <button onclick="go('livecall')">Live call in progress (copilot)</button>
      <button onclick="go('principles')">UX principles (the tag)</button>
      <h4>Setup &amp; account</h4>
      <button onclick="go('readiness')">Go-live readiness (POR.1/9)</button>
      <button onclick="go('forwarding')">Forwarding (POR.2)</button>
      <button onclick="go('consent')">Consent (POR.3)</button>
      <button onclick="go('alerts')">Alerts (POR.5)</button>
      <button onclick="go('switch')">Switch patient (POR.15)</button>
      <button onclick="go('leave')">Leave program (POR.16)</button>
    </div>
    <button onclick="document.getElementById('demoPanel').classList.toggle('open')" aria-label="Demo controls">demo ⚙</button>
  </div>
</div>

<script>
// ── mock data: system events already translated into how a daughter thinks ──
const PATIENT={name:"Mom",who:"your mother",age:83,stage:"moderate-stage Alzheimer's",voice:"alex_clean"};
let STATE="attention";
const PERSONAS=[{id:"mom",label:"Mom (your twin “Alex”)",active:true},{id:"rosa",label:"Aunt Rosa"}];

const MOMENT={tone:"alert",kind:"A tough moment this morning",when:"Today, 9:21 AM · from an 11-minute call",
  summary:"Mom got upset looking for Dad near the end of the call. The twin stayed calm, reassured her, and the call ended gently.",
  said:[{who:"the twin",t:"It's me. It's Thursday. The garden's probably waking up about now."},
        {who:"Mom",t:"The roses… your father planted the roses. Where is he? He didn't come down."},
        {who:"Mom",t:"He's late. He's never late. Something's wrong, I can feel it.",flag:"This is the upsetting moment"},
        {who:"the twin",t:"Let's take a breath together. You're safe, and I'm right here with you."}],
  adjust:"Mom gets upset looking for Dad. You can soften how the twin responds, or have it tell you sooner."};
const MOMENT2={tone:"look",kind:"Mom seemed unsure",when:"Yesterday, 6:51 PM · from a 7-minute call",
  summary:"Mom wasn't sure whether she'd eaten. Worth a glance, not urgent.",
  said:[{who:"Mom",t:"Did I have lunch? I can't… I don't think I did."},
        {who:"the twin",t:"You had soup a little while ago — and there's more whenever you're hungry."}],
  adjust:"If this keeps happening, the twin can gently remind her about meals."};

const APPROVALS=[
  {tags:["From a call","Life stories"],text:"Mom planted the roses with Dad; she may ask where he is."},
  {tags:["From a call","People"],text:"Mom calls her neighbour “the kind young man next door.”"},
  {tags:["You said it"],text:"Mom likes her tea with a little honey, not sugar."}];

const CALLS=[
  {affect:"tough",when:"Today, 9:14 AM",len:"11 min",tracks:3,text:"Talked about the garden, asked twice when you're visiting. One tough moment near the end — handled gently.",
   chapters:[["0:00","Warm hello"],["3:40","The garden & roses"],["8:10","Looking for Dad — upset"],["9:30","Calmed, gentle goodbye"]]},
  {affect:"calm",when:"Yesterday, 6:40 PM",len:"7 min",tracks:1,text:"Quiet check-in before dinner. Mentioned Dr. Reyes on Tuesday and that Sarah called."},
  {affect:"bright",when:"Yesterday, 8:55 AM",len:"9 min",tracks:2,text:"Good morning call. Reminisced about Sanibel Island. Took her medication prompt well."},
  {affect:"calm",when:"Mon, 9:02 AM",len:"6 min",tracks:2,text:"Short and steady. Asked about the weather and the cat. (Call dropped & she called back — shown as one.)"}];
const AFFECT={tough:{c:"var(--look)",w:"a tough moment"},calm:{c:"var(--calm)",w:"calm"},bright:{c:"var(--calm)",w:"bright"}};

const MEMORY={
  "People":["Dad — her husband, planted the roses together","Sarah — her daughter, calls on weekends","“The kind young man next door”"],
  "Life stories":["Summers at Sanibel Island collecting shells","Taught third grade for 30 years","Met Dad at a church dance in 1961"],
  "Likes & comforts":["Tea with a little honey","The garden, especially the roses","Her cat, Biscuit"],
  "Health & care notes":["Morning medication around 9 AM","Dr. Reyes — next visit Tuesday","Gets anxious in the late afternoon"]};

const GAPS=[{q:"What's a story Mom loves to retell?",area:"Life stories"},
            {q:"Who are the people she asks about most?",area:"People"},
            {q:"What helps her settle when she's anxious?",area:"Comfort"}];

const COVERAGE=[["Who she is",88],["People",64],["Places",40],["Life stories",60],["Comforts",75],["Routines",20],["Health (light)",100]];
const VOICE={quality:74,clone:"Ready — “alex_clean”",accepted:"Sarah confirmed it sounds like you",minutes:176};

const SECTIONS=[
  {id:"preamble",name:"Who the twin is",desc:"The core framing — your son, calling his father.",v:3},
  {id:"speech",name:"How it should sound",desc:"Short and warm, like a son on the phone.",v:1},
  {id:"comfort",name:"Calming topics",desc:"Where to steer when she's stuck or upset.",v:2},
  {id:"rules",name:"Hard rules",desc:"Things the twin must never do.",v:1}];

const CHECKINS=["Mom, are you still there?","Take your time, I'm here when you're ready.","I'm still here with you, Mom.","No rush, Mom. I'm right here."];
const PRONOUN=[["Eli","EH-lee"],["Sanibel","SAN-ih-bell"]];
const REACTIONS=[["When she needs reassurance","Affirm warmly, slow down, stay close."],["When she's confused about time","Gently orient — day, light outside — never argue."],["When she asks for Dad","Acknowledge the feeling, steer to a warm memory; don't insist he's gone."]];

const CONSENT=[
  {k:"A",t:"Record calls",sub:"So you can listen back",on:true,cons:"Turning this off stops recording and pauses saved transcripts."},
  {k:"E",t:"Let the twin listen to your calls",sub:"To learn Mom's voice & stories",on:true,cons:"Turning this off stops forwarding — the twin can't learn from real calls."},
  {k:"F",t:"Use your voice for interviews",sub:"Powers “fill a gap”",on:true,cons:"Turning this off ends voice interviews; past interview audio is erased."},
  {k:"clone",t:"Keep the cloned voice",sub:"How the twin sounds like you",on:true,cons:"Turning this off erases the voice clone — the twin can no longer speak."}];

const CONTACTS=[{name:"You (Ivan)",role:"first to know",you:true},{name:"Carol — Mom's sister",role:"backup"},{name:"Dr. Reyes' office",role:"last resort"}];
const PRESETS=["Gentle (fewer alerts)","Balanced","Watchful (more alerts)"];

const PROMISES=[{text:"Sarah is visiting Sunday afternoon",when:"until Sunday",live:true},{text:"Rami will call tonight at 7",when:"until tonight",live:true}];
const ROUTINES=[{t:"Morning",d:"Coffee, then the garden. Ask how she slept."},{t:"Medication",d:"Around 9 AM — gently remind, don't nag."},{t:"Bedtime",d:"Wind down by 9. The cat usually settles with her."}];

const READY=[["Phone calls reach the twin","Connected — and it transfers to you",true],
  ["You've allowed recording","Signed June 9",true],["The cloned voice is ready","“alex_clean” — confirmed by Sarah",true],
  ["The twin knows how to talk","11 guidance sections written",true],["Memory book is rich","167 memories",true],
  ["One supervised first call","Done — you listened in",true]];

// ── router: shallow hub-and-spoke, always a back arrow ──
const stage=document.getElementById('top'),stg=document.getElementById('stage');
let stack=[];
function go(n,o={}){document.getElementById('demoPanel').classList.remove('open');stack.push({n,o});render();}
function back(){stack.pop();render();}
function root(n){stack=[{n,o:{}}];render();}
const SCREENS={};
const HUB={home:'home',calls:'calls',activity:'calls',call:'calls',recordings:'calls',escal:'calls',moment:'calls',moment2:'calls',live:'calls',livecall:'calls',
  memory:'memory',approve:'memory',membook:'memory',memlist:'memory',gap:'memory',voice:'memory',talks:'memory',section:'memory',handles:'memory',sandbox:'memory',
  settings:'settings',forwarding:'settings',consent:'settings',alerts:'settings',promises:'settings',routines:'settings',readiness:'settings',switch:'settings',account:'settings',leave:'settings',wizard:'settings',principles:'settings'};

function render(){
  const cur=stack[stack.length-1]||{n:"home",o:{}};const s=SCREENS[cur.n];
  if(cur.n==="home"){stage.innerHTML=`<div><div class="eyebrow">Good morning</div><h2>Looking after ${PATIENT.name}</h2></div><div class="lead" style="margin-left:auto" aria-hidden="true">🌿</div>`;}
  else{stage.innerHTML=`<button class="back" onclick="back()" aria-label="Go back">‹</button><h2>${s.title}</h2>`;}
  stg.innerHTML=s.render(cur.o);stg.scrollTop=0;stg.focus();
  document.getElementById('fab').style.display=(HUB[cur.n]==='memory'||cur.n==='home')?'block':'none';
  renderNav(HUB[cur.n]||cur.n);
}
function renderNav(active){
  const items=[["home","🏠","Home"],["calls","📞","Calls"],["memory","📖","Memory"],["settings","⚙️","Settings"]];
  document.getElementById('nav').innerHTML=items.map(([id,ic,l])=>
    `<button onclick="root('${id}')" ${active===id?'aria-current="page"':''}><span class="ic" aria-hidden="true">${ic}</span><span>${l}</span></button>`).join('');
}
function setState(s){STATE=s;document.getElementById('demoPanel').classList.remove('open');root('home');}
function row(icon,title,sub,onclick){return `<button class="row" onclick="${onclick}"><span class="lead" aria-hidden="true">${icon}</span><span><span class="rtitle">${title}</span><br><span class="rsub">${sub}</span></span><span class="chev" aria-hidden="true">›</span></button>`;}
function hub(intro,rows){return `<p class="intro">${intro}</p>${rows.join("")}`;}

// ══ HOME (POR.13 dashboard · POR.8 call-now) ══
SCREENS.home={title:"Home",render(){
  const verdict=STATE==="attention"
    ?`<div class="hero alert card" role="status" aria-live="polite"><span class="pill alert"><span class="dot" style="background:#fff"></span> One thing to look at</span>
       <h3>${MOMENT.kind}</h3><p>${MOMENT.summary}</p><button class="btn primary" onclick="go('moment')">See what happened</button></div>`
    :`<div class="hero calm card" role="status" aria-live="polite"><span class="pill calm">✓ Everything's calm</span>
       <h3>${PATIENT.name} had a calm morning</h3><p>A gentle 9-minute call. Nothing needs you right now — you can breathe easy.</p>
       <button class="btn ghost" onclick="go('activity')">Listen if you'd like</button></div>`;
  const rows=[STATE==="attention"?row("🟡","Worth a look","Mom seemed unsure whether she'd eaten · yesterday","go('moment2')"):"",
    row("📞","Call Mom now","Rings you first, then Mom — the twin never self-dials","go('live')"),
    row("🌱",`${APPROVALS.length} things to approve`,"New things the twin learned about Mom","go('approve')"),
    row("🎙️","Fill a gap together","Tell the twin more about Mom — just talk","go('gap')")];
  const tag=`<div style="text-align:center;margin:.1rem 0 .7rem"><button class="chip" onclick="go('principles')" style="font-size:.82rem">ⓘ Designed for caregivers — why it's this simple</button></div>`;
  return tag+verdict+`<div style="margin-top:.4rem">${rows.join("")}</div>`+
    `<p class="reassure">The twin is always growing — never “done.” You're doing enough. 💛</p>`;
}};

// ══ CALLS hub (POR.6 history+skim · POR.8 live · POR.14 recordings · POR.11 escalations) ══
SCREENS.calls={title:"Calls",render(){return hub("Everything about ${PATIENT.name}'s calls — all gentle, all saved.".replace('${PATIENT.name}',PATIENT.name),[
  row("📞","Call Mom now","Start a call — rings you first","go('live')"),
  row("🕑","Recent calls","4 this week · replay or skim","go('activity')"),
  row("⚑","Tough moments","Things the twin flagged for you","go('escal')"),
  row("🎧","Recordings","Listen to any call","go('recordings')")]);}};

SCREENS.live={title:"Call Mom",render(){return `
  <div class="card"><span class="pill soft">Standby</span>
    <h3 style="font-family:var(--serif);margin:.5rem 0">The twin is ready</h3>
    <p class="muted">When you call, it rings <b>you</b> first, then Mom — you're always on the line. Mom never gets an unexpected call.</p>
    <button class="btn primary" style="margin-top:.4rem" onclick="say('Calling you, then Mom…');go('livecall')">📞 Start the call</button>
    <button class="btn ghost" style="margin-top:.6rem" onclick="go('livecall')">Just listen in</button></div>
  <div class="section-label">When you're on a live call you can</div>

SCREENS.livecall={title:"On a call with Mom",render(o){
  const mode=o.mode||"listen";
  const transcript=`
    <div class="bubble twin"><div class="who">THE TWIN</div>Morning, Mom. Did you sleep alright?</div>
    <div class="bubble mom"><div class="who">MOM</div>Oh… is that you? The garden looks lovely today.</div>

    <div class="bubble mom"><div class="who">MOM</div>Not yet. Where did I put my cup…</div>`;
  const present=`<div class="card" style="background:var(--calm-soft);border:none;display:flex;align-items:center;gap:.6rem">
     <span class="dot" style="background:var(--calm);width:.7rem;height:.7rem;animation:pulse 1.5s infinite"></span>
     <span><b>You're on the call</b> · 02:14<br><span class="muted small">${mode==='takeover'?'Mom is hearing YOUR voice now':'Listening — the twin is speaking'}</span></span></div>`;
  if(mode==="takeover") return present+transcript+
    `<div class="card" style="background:var(--alert-soft);border:none;text-align:center"><b>You're speaking to Mom</b><br>
       <span class="muted small">She hears your real voice. The twin is paused.</span></div>
     <button class="btn primary" onclick="say('Handed back — the twin picks up with full context');go('livecall',{mode:'listen'})">↩ Hand back to the twin</button>`;
  return present+transcript+
    `<div class="section-label">You can step in — gently</div>
     <div class="card"><label class="lbl">Send the twin a quiet nudge</label>
       <input class="field" placeholder="e.g. Remind her Sarah visits Sunday">
       <button class="btn ghost" onclick="say('Nudge sent — the twin will work it in within a turn')">💬 Send nudge (only the twin hears)</button></div>
     <button class="btn primary" onclick="confirmTakeover()">🗣️ Speak to Mom in your voice</button>
     <div class="btnrow"><button class="btn ghost" onclick="say('Twin paused — auto-resumes in 30s')">⏸ Pause the twin</button>
       <button class="btn ghost" onclick="flagMoment()">⚑ Flag this</button></div>
     <button class="btn danger" style="margin-top:.6rem" onclick="endCall()">End the call</button>
     <p class="reassure">A real person is on every call. The twin never speaks to Mom alone. 🤝</p>`;
}};
function confirmTakeover(){const s=document.createElement('div');s.className='sheet';s.id='sheet';
  s.innerHTML=`<div class="inner" style="text-align:center"><h3 style="font-family:var(--serif)">Mom will hear your voice</h3>
    <p class="muted">The twin pauses and Mom hears <b>you</b>. We'll give a soft 3-second heads-up first.</p>
    <button class="btn primary" onclick="closeSheet();say('3… 2… 1 — you're live with Mom');go('livecall',{mode:'takeover'})">Yes, let me speak</button>
    <button class="btn ghost" style="margin-top:.6rem" onclick="closeSheet()">Not now</button></div>`;
  document.querySelector('.phone').appendChild(s);}
function flagMoment(){say('Flagged for you to review later');}
function endCall(){const s=document.createElement('div');s.className='sheet';s.id='sheet';
  s.innerHTML=`<div class="inner" style="text-align:center"><h3 style="font-family:var(--serif)">End the call?</h3>
    <p class="muted">The twin will give Mom a warm goodbye — no abrupt hang-up.</p>
    <button class="btn danger" onclick="closeSheet();say('The twin said goodbye gently. Call ended.');root('home')">End call</button>
    <button class="btn ghost" style="margin-top:.6rem" onclick="closeSheet()">Stay on</button></div>`;
  document.querySelector('.phone').appendChild(s);}

// ══ FIRST-RUN ONBOARDING WIZARD (POR.1) — 5 guided steps ══
SCREENS.wizard={title:"Set up the twin",render(o){
  const step=o.step||1,total=5;
  const bar=`<div class="stepbar">${Array.from({length:total}).map((_,k)=>`<i class="${k<step?'on':''}"></i>`).join("")}</div>`;
  const go2=(s,l,cls)=>`<button class="btn ${cls||'primary'}" onclick="go('wizard',{step:${s}})">${l}</button>`;
  const bodies={
    1:`<div class="card" style="text-align:center"><div style="font-size:2.6rem">🌿</div>
        <h3 style="font-family:var(--serif)">Let's set up Mom's twin</h3>
        <p class="muted">About 5 minutes. Most of it is already filled in from her intake — the one hands-on step is turning on call forwarding from Mom's phone.</p></div>
       ${go2(2,"Let's begin")}
       <p class="reassure">You can stop anytime and pick up where you left off (we save it for 14 days).</p>`,
    2:`<div class="eyebrow">Step 2 · About Mom</div><p class="intro">We pre-filled this from her intake — just check it's right.</p>
       <div class="card"><label class="lbl">What the twin calls her</label><input class="field" value="Mom">
         <label class="lbl">Her phone</label><input class="field" value="+1 (518) 808-3737">
         <label class="lbl">State (sets the privacy rules)</label><input class="field" value="New York"></div>
       ${go2(3,"Looks right — continue")}`,
    3:`<div class="eyebrow">Step 3 · Forwarding (the one hands-on step)</div>
       <p class="intro">This sends Mom's calls to the twin. Do it on <b>Mom's</b> phone — we'll guide you.</p>
       <div class="card"><label class="lbl">Her phone company</label><select class="field"><option>Verizon</option><option>AT&T</option></select>
         <button class="btn ghost" onclick="say('Opening the dialer…')">📞 Tap to dial *72 …8231</button>
         <button class="btn primary" style="margin-top:.6rem" onclick="say('Calling to check… it works! ✓')">Test it</button></div>
       <p class="muted small">Can't do it now? <a href="#" onclick="say('We’ll text you the steps + a help callback');return false" style="color:var(--accent-ink)">Send me the steps</a>. In a two-party-consent state, use an interview instead.</p>
       ${go2(4,"Forwarding's on — continue")}`,
    4:`<div class="eyebrow">Step 4 · How the twin learns Mom</div><p class="intro">Pick one — you can change it later.</p>
       <button class="row" onclick="go('wizard',{step:5})"><span class="lead">👂</span><span><span class="rtitle">Listen along (easiest)</span><br><span class="rsub">It learns from her real calls — nothing for you to do</span></span><span class="chev">›</span></button>
       <button class="row" onclick="go('wizard',{step:5})"><span class="lead">🎙️</span><span><span class="rtitle">Sit down for interviews</span><br><span class="rsub">Answer questions in your own words — great gap-filler</span></span><span class="chev">›</span></button>`,
    5:`<div class="hero calm card" style="text-align:center"><div style="font-size:2.4rem">✓</div>
        <h3 style="font-family:var(--serif)">Almost there</h3><p>Here's what's ready before the twin takes a real call.</p></div>
       ${READY.map(([t,,ok])=>`<div class="card" style="display:flex;gap:.7rem;align-items:center"><span style="color:var(--calm)">${ok?'✓':'•'}</span><span>${t}</span></div>`).join("")}
       <button class="btn calm" onclick="say('The twin is live for Mom 🌿');root('home')">Go live</button>`
  };
  return bar+bodies[step];
}};

// ══ UX PRINCIPLES — the in-app explainer (the "tag") ══
const PRINCIPLES=[
  ["1","One glance: “is everything okay?”","The home answers the only question a worried caregiver has — in under 2 seconds. A verdict, never two alarming numbers."],
  ["2","Important now, not everything","The system already did the triage: one thing to look at, not a 221-item queue."],
  ["3","Plain human language","“Mom seemed unsure whether she'd eaten,” never “DISTRESS intent detected.”"],
  ["4","Shallow, linear navigation","Home → card → moment → back. Four simple hubs, always a back arrow. No operator console."],
  ["5","Large targets, high contrast, space","Full-width cards & buttons (54px+), big readable type — built for a thumb and aging eyes."],
  ["6","Reassuring, not a to-do debt","“Always growing — never done. You're doing enough,” instead of “67% / 221 unreviewed.”"],
  ["7","Voice is a first-class input","“Answer however you like” — talk, don't fill forms."],
  ["8","The system carries the memory","Affect-tagged calls, resumable setup — the caregiver never has to reconstruct context."]];
SCREENS.principles={title:"Why it's built this way",render(){
  return `<p class="intro">This portal is made for the <b>50/60+ family caregiver</b> — often anxious, mobile, mid-task. Every screen follows these principles.</p>`+
    PRINCIPLES.map(([n,t,d])=>`<div class="card" style="display:flex;gap:.8rem"><span class="lead" style="background:var(--calm-soft);color:var(--calm-ink,var(--calm));font-family:var(--serif);font-weight:700">${n}</span>
       <span><b>${t}</b><br><span class="muted small">${d}</span></span></div>`).join("")+
    `<div class="card" style="background:var(--sunk);border:none"><b>Accessibility, always</b><br><span class="muted small">Real buttons & keyboard, AA contrast, color + words (never color alone), text that respects your phone's size setting, calm motion.</span></div>
     <div class="card" style="background:var(--look-soft);border:none"><b>Two lenses, one system</b><br><span class="muted small">This is the <b>family</b> view. A separate, denser <b>operator console</b> serves trained monitors doing live steering — same events, different lens.</span></div>`;
}};

// voice-memo FAB (POR.7) — record → extract → confirm
function openMemo(){const s=document.createElement('div');s.className='sheet';s.id='sheet';
  s.innerHTML=`<div class="inner"><div style="display:flex;justify-content:space-between;align-items:center">
    <h3 style="font-family:var(--serif);margin:0">Add a memory</h3><button class="back" onclick="closeSheet()" aria-label="Close">✕</button></div>
    <p class="muted">Just talk — say anything about Mom. We'll turn it into memories for you to confirm.</p>
    <button class="mic" onclick="say('Listening…');this.nextElementSibling.style.display='block'">🎙️</button>
    <div style="display:none">
      <div class="card"><b>I heard:</b> “Mom loves Ella Fitzgerald, plays her every evening.”</div>
      <div class="card"><span class="pill soft">Likes & comforts</span><p style="margin:.4rem 0 0">Mom enjoys Ella Fitzgerald in the evenings.</p></div>
      <button class="btn calm" onclick="say('Added — the twin will use it');closeSheet()">✓ Add this</button>
      <button class="btn ghost" style="margin-top:.5rem" onclick="closeSheet()">Not quite — try again</button></div>
    <button class="btn ghost" style="margin-top:.6rem" onclick="say('Type instead…')">Type it instead</button></div>`;
  document.querySelector('.phone').appendChild(s);}
function closeSheet(){const s=document.getElementById('sheet');if(s)s.remove();}

function say(msg){let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';
    t.style.cssText='position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:#2b2722;color:#fff;padding:.7rem 1.1rem;border-radius:999px;font-size:.92rem;z-index:60;max-width:88%;text-align:center';
    document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity=1;clearTimeout(t._h);t._h=setTimeout(()=>t.style.opacity=0,2800);}

root('home');
</script>
</body>
</html>
